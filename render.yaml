databases:
  - name: idf-mobilites-db
    plan: free
    databaseName: idf_mobilites
    user: idf_mobilites

services:
  - type: web
    name: idf-mobilites-mercure
    runtime: image
    plan: free
    autoDeploy: true
    image:
      url: docker.io/dunglas/mercure:v0.16
    healthCheckPath: /healthz
    envVars:
      - key: SERVER_NAME
        value: ":10000"
      - key: MERCURE_PUBLISHER_JWT_KEY
        generateValue: true
      - key: MERCURE_SUBSCRIBER_JWT_KEY
        fromService:
          type: web
          name: idf-mobilites-mercure
          envVarKey: MERCURE_PUBLISHER_JWT_KEY
      - key: MERCURE_EXTRA_DIRECTIVES
        value: |
          cors_origins *
          heartbeat 2s
          anonymous

  - type: web
    name: idf-mobilites-api
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: idf-mobilites-db
          property: connectionString
      - key: CORS_ALLOW_ORIGIN
        value: '^https://.*\.onrender\.com$'
      - key: MERCURE_JWT_SECRET
        fromService:
          type: web
          name: idf-mobilites-mercure
          envVarKey: MERCURE_PUBLISHER_JWT_KEY
      - key: MERCURE_HOSTPORT
        fromService:
          type: web
          name: idf-mobilites-mercure
          property: hostport
      - key: MERCURE_PUBLIC_BASE_URL
        fromService:
          type: web
          name: idf-mobilites-mercure
          envVarKey: RENDER_EXTERNAL_URL
      - key: IDFM_API_KEY
        sync: false
      - key: PRIM_API_TOKEN
        sync: false
      - key: IDFM_API_URL
        value: https://prim.iledefrance-mobilites.fr/marketplace
      - key: PRIM_NAVITIA_URL
        value: https://prim.iledefrance-mobilites.fr/marketplace/v2/navitia
      - key: OSRM_URL
        value: https://router.project-osrm.org/route/v1/driving
      - key: JUSTIF_ORG_NAME
        value: Île-de-France Mobilités
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: idf-mobilites-umami
    runtime: image
    plan: free
    autoDeploy: true
    image:
      url: ghcr.io/umami-software/umami:postgresql-latest
    healthCheckPath: /api/heartbeat
    envVars:
      # Copy Internal Database URL from idf-mobilites-db, replace /idf_mobilites with /umami
      # (run scripts/render-init-databases.sql on the Postgres instance first).
      - key: DATABASE_URL
        sync: false
      - key: APP_SECRET
        generateValue: true

  - type: keyvalue
    name: idf-mobilites-glitchtip-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: idf-mobilites-glitchtip
    runtime: image
    plan: free
    autoDeploy: true
    image:
      url: docker.io/glitchtip/glitchtip:latest
    healthCheckPath: /login
    dockerCommand: sh -c "./bin/run-celery-with-beat.sh & exec ./bin/start.sh"
    envVars:
      # Copy Internal Database URL from idf-mobilites-db, replace /idf_mobilites with /glitchtip
      # (run scripts/render-init-databases.sql on the Postgres instance first).
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: idf-mobilites-glitchtip-redis
          property: connectionString
      - key: EMAIL_URL
        value: consolemail://
      - key: DEFAULT_FROM_EMAIL
        value: noreply@idf-mobilites.onrender.com
      - key: GLITCHTIP_DOMAIN
        fromService:
          type: web
          name: idf-mobilites-glitchtip
          envVarKey: RENDER_EXTERNAL_URL
      - key: ENABLE_USER_REGISTRATION
        value: "True"
      - key: CELERY_WORKER_CONCURRENCY
        value: "2"

  - type: web
    name: idf-mobilites-web
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: idf-mobilites-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_MERCURE_URL
        fromService:
          type: web
          name: idf-mobilites-mercure
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_UMAMI_URL
        fromService:
          type: web
          name: idf-mobilites-umami
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_UMAMI_WEBSITE_ID
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
