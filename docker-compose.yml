services:
  postgres:
    image: postgres:16-alpine
    container_name: idf-mobilites-postgres
    environment:
      POSTGRES_DB: idf_mobilites
      POSTGRES_USER: idf_mobilites
      POSTGRES_PASSWORD: idf_mobilites
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idf_mobilites -d idf_mobilites"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: idf-mobilites-api
    depends_on:
      postgres:
        condition: service_healthy
      mercure:
        condition: service_started
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: dev-secret-idf-mobilites
      DATABASE_URL: postgresql://idf_mobilites:idf_mobilites@postgres:5432/idf_mobilites?serverVersion=16&charset=utf8
      CORS_ALLOW_ORIGIN: ^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ""
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://localhost:3001/.well-known/mercure
      MERCURE_JWT_SECRET: "!ChangeThisMercureHubJWTSecretKey!"
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api_vendor:/app/vendor
      - api_var:/app/var
    working_dir: /app
    command: >
      sh -lc "if [ ! -f .env ]; then cp .env.example .env; fi &&
      composer install &&
      php bin/console doctrine:database:create --if-not-exists &&
      if ls migrations/*.php >/dev/null 2>&1; then php bin/console doctrine:migrations:migrate --no-interaction; fi &&
      php -S 0.0.0.0:8000 -t public"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: idf-mobilites-web
    depends_on:
      - api
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MERCURE_URL: http://localhost:3001/.well-known/mercure
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    working_dir: /app
    command: >
      sh -lc "pnpm install &&
      pnpm dev --hostname 0.0.0.0 --port 3000"

  mercure:
    image: dunglas/mercure
    container_name: idf-mobilites-mercure
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:3000 http://127.0.0.1:3000
        heartbeat 2s
        anonymous
    ports:
      - "3001:80"

volumes:
  postgres_data:
  api_vendor:
  api_var:
  web_node_modules:
  web_next:
