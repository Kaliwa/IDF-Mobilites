# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\DisruptionService: ~

    App\Service\JustificatifPdfBuilder:
        arguments:
            $issuerName: '%env(string:JUSTIF_ORG_NAME)%'

    App\Service\PrimClient:
        arguments:
            $primApiToken: '%env(PRIM_API_TOKEN)%'

    App\Service\LineRefResolver:
        arguments:
            $apiKey: '%env(PRIM_API_TOKEN)%'
            $navitiaBaseUrl: '%env(default::PRIM_NAVITIA_URL)%'

    App\Service\NavitiaDisruptionClient:
        arguments:
            $apiKey: '%env(PRIM_API_TOKEN)%'
            $navitiaBaseUrl: '%env(default::PRIM_NAVITIA_URL)%'

    App\Service\IdfmRouteService:
        arguments:
            $apiKey: '%env(PRIM_API_TOKEN)%'
            $navitiaBaseUrl: '%env(default::PRIM_NAVITIA_URL)%'

    # SonataAdmin — Admin classes
    App\Admin\UserAdmin:
        arguments:
            $passwordHasher: '@security.user_password_hasher'
        tags:
            - name: sonata.admin
              model_class: App\Entity\User
              manager_type: orm
              group: 'Utilisateurs'
              label: 'Utilisateurs'

    App\Admin\AbonnementAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\Abonnement
              manager_type: orm
              group: 'Abonnements'
              label: 'Abonnements'

    App\Admin\PaymentAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\Payment
              manager_type: orm
              group: 'Abonnements'
              label: 'Paiements'

    App\Admin\PayeurAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\Payeur
              manager_type: orm
              group: 'Abonnements'
              label: 'Payeurs'

    App\Admin\ContractAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\Contract
              manager_type: orm
              group: 'Documents'
              label: 'Contrats'

    App\Admin\SubscriptionDossierAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\SubscriptionDossier
              manager_type: orm
              group: 'Documents'
              label: 'Dossiers'

    App\Admin\TransitLineAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\TransitLine
              manager_type: orm
              group: 'Transport'
              label: 'Lignes'

    App\Admin\SupportConversationAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\SupportConversation
              manager_type: orm
              group: 'Support'
              label: 'Conversations'

    App\Admin\SupportAccountRequestAdmin:
        tags:
            - name: sonata.admin
              model_class: App\Entity\SupportAccountRequest
              manager_type: orm
              group: 'Support'
              label: 'Demandes de compte'
