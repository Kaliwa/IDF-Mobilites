security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User

    role_hierarchy:
        ROLE_SUPPORT: ROLE_USER
        ROLE_ADMIN: [ROLE_SUPPORT]

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        admin:
            pattern: ^/admin
            provider: app_user_provider
            form_login:
                login_path: app_admin_login
                check_path: app_admin_login_check
                default_target_path: /admin/dashboard
                enable_csrf: false
                username_parameter: _username
                password_parameter: _password
            logout:
                path: app_admin_logout
                target: app_admin_login
        login:
            pattern: ^/api/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/admin/login$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_SUPPORT }
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api/support/request$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/health$, roles: PUBLIC_ACCESS }
        - { path: ^/api/orientation, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/(contexts|errors|validation_errors|\.well-known/genid), roles: PUBLIC_ACCESS }
        - { path: ^/api$, roles: PUBLIC_ACCESS, methods: [GET, HEAD] }
        - { path: ^/api/routes$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
